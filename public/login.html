<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#da8814">
    <title>login|casa de mamãe </title>
<link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-16.png" sizes="16x16">
<link rel="icon" href="/icons/icon-32.png" sizes="32x32">
<link rel="icon" href="/icons/icon-192.png" sizes="192x192">
<link rel="icon" href="/favicon.ico">
    <style>
 body {
margin: 0;
font-family: Arial, sans-serif;

background:  
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),  
    url("img/banner.webp");  

  background-size: cover;  
  background-position: center;  
  background-repeat: no-repeat;  

  display: flex;  
  flex-direction: column;  
  align-items: center;  

  min-height: 100dvh;  
  padding: 20px;  
}  

h1 {  
  color: white;  
  margin-bottom: 20px;  
  text-align: center;  
}  

.container {  
  width: 100%;  
  max-width: 400px;  
}  

form {
  display: flex;
  flex-direction: column;
  gap: 4px; 

  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  padding: 28px;
  border-radius: 12px;

  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.2);
  margin-top: 48px;
}

label {  
 
  margin: 0px;  
  color: white;  
  font-weight: 500;  
 
}  

input {  
  width: 100%;  
  padding: 8px;  
   

  border-radius: 6px;  
  border: none;  

  font-size: 16px;  
  outline: none;  
  box-sizing: border-box;
}  

button {  
  width: 100%;  
  background-color: #df8927;  
  color: white;  

  padding: 10px;  
  border: none;  
  border-radius: 6px;  

  font-weight: bold;  
  font-size: 16px;  

  cursor: pointer;  
  transition: 0.3s ease;  
  box-sizing: border-box;
}  

button:hover {  
  background-color: #f29736;  
  transform: translateY(-2px);  
}  

/* 📱 Mobile */  
@media (max-width: 480px) {  
  h1 {  
    font-size: 22px;  
     margin-top: 48px;
  }  

  form {  
    padding: 25px;  
    margin-top: 48px;
  }  
}
    </style>
</head>
<body>
    <h1>Faça seu login</h1>

<div class="container">

    <!---- LOGIN -->
    <form id="loginForm" action="/login" method="post">
        <label>Usuário:</label>
        <input type="text" name="username" required><br><br>

        <label>Senha:</label>
        <input type="password" name="password" required><br><br>

        <button type="submit">Entrar</button><br><br>

        <button type="button" id="registerButton">Cadastro</button>
    </form>

    <!--  CADASTRO -->
    <form id="registerForm" action="/cadastro" method="post" style="display: none;">
        <label>Usuário:</label>
        <input type="text" name="username" required><br><br>

        <label>Telefone:</label>
        <input type="text" name="fone" required><br><br>

        <label>CEP:</label>
        <input type="text" name="cep" required><br><br>

        <label>Endereço:</label>
        <input type="text" name="endereco" required><br><br>

        <label>Senha:</label>
        <input type="password" name="password" required><br><br>

        <button type="submit">Cadastrar</button>
    </form>

</div>

<script>
   const registerForm = document.getElementById("registerForm");
const loginForm = document.getElementById("loginForm");
const registerButton = document.getElementById("registerButton");


// Mostrar cadastro
registerButton.addEventListener("click", () => {
    loginForm.style.display = "none";
    registerForm.style.display = "block";
});


// Cadastro
registerForm.addEventListener("submit", async function(event) {
    event.preventDefault();

    const formData = new FormData(registerForm);

    const data = {
        username: formData.get("username"),
        fone: formData.get("fone"),
        cep: formData.get("cep"),
        endereco: formData.get("endereco"),
        password: formData.get("password")
    };

    const response = await fetch("/cadastro", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    alert(result.message);

    if (response.ok) {
        registerForm.reset();
        registerForm.style.display = "none";
        loginForm.style.display = "block";
    }
});
// Login
loginForm.addEventListener("submit", async function(event) {
    event.preventDefault();

    const formData = new FormData(loginForm);

    const data = {
        username: formData.get("username"),
        password: formData.get("password")
    };

    const response = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if (response.ok) {

        // Salva token
        localStorage.setItem("token", result.token);

        // Salva dados do usuário
        localStorage.setItem("user", JSON.stringify(result.user));

        alert("Login realizado com sucesso");

        window.location.href = "index.html";

    } else {
        alert(result.message);
    }
});



</script>

<script src="main.js"></script>
</body>
</html>
