<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link rel="stylesheet" href="stile.css">
</head>
<body>
<header>
    <img src="img/logo.webp" alt="logo" class="logo">

    <div class="letreiro-container">
        <a href="index.html">Início</a>
        <a href="cardapio.html">Cardápio</a>
        <a href="kitfesta.html">Encomendas</a>
    </div>
</header>

<main>

<div class="container">

  <div class="card">

    <div class="nota">
      <h1>Seu Carrinho</h1>
    </div>

    <div id="cart-items"></div>

    <div class="section">
      <h3>Entrega</h3>

      <label>
        <input type="radio" name="entrega" value="Entrega">
        Entrega
      </label>

      <label>
        <input type="radio" name="entrega" value="Retirada">
        Retirada
      </label>
    </div>

    <div class="section">
      <h3>Pagamento</h3>

      <label>
        <input type="radio" name="pagamento" value="Débito">
        Débito
      </label>

      <label>
        <input type="radio" name="pagamento" value="Crédito">
        Crédito
      </label>

      <label>
        <input type="radio" name="pagamento" value="Pix">
        Pix
      </label>
    </div>

    <h3 id="total"></h3>

    <button id="btnFinalizar">Enviar Pedido</button>

    <button id="clear" onclick="limparCarrinho()">
      Limpar Carrinho
    </button>

  </div>

</div>
</main>


  <footer>

<div class="linha-topo">

<img src="img/logo.webp" class="logo" alt="logo">

<p class="atendimento">
Atendemos de terça a sábado das 9h às 18h
</p>

<div class="social">

<a href="https://www.instagram.com/seuinstagram" target="_blank">
<img src="img/insta.webp.png" class="insta" alt="instagram">
</a>

<p class="endereco">
Rua Florianópolis 365 – Gaivotas – Litoral<br>
São Paulo - SP 
</p alt="endereço">

</div>

</div>

<p class="direitos" alt="direitos autorais">
© 1998 Casa de Mamãe. Todos os direitos reservados.
</p>

</footer>
    


<script src="carrinho.js"></script>
</body>
</html>
