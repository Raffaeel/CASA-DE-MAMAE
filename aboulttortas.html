<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tortas</title>
    <style>

        body {
    background-color: rgb(247, 245, 249);
}

/* Container das tortas */
.tortas-container {
    display: flex;
    gap: 50px;
    justify-content: center;
    padding: 3%;
    flex-wrap: wrap; /* Permite que os itens quebrem para a linha seguinte quando necessário */
}

/* Itens das tortas */
.tortas-item {
    text-align: center;
    flex: 1 1 200px; /* Permite que os itens se ajustem dinamicamente */
    margin: 10px;
}

/* Imagem das tortas */
.tortas-item img {
    width: 100%; /* Faz com que a imagem ocupe 100% da largura do seu contêiner */
    max-width: 190px; /* Limita o tamanho máximo para 190px */
    height: auto; /* Mantém a proporção da imagem */
    border: 3px solid black;
}

/* Títulos */
h2 {
    text-align: center;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
}

/* Responsividade para telas menores */
@media (max-width: 768px) {
    .tortas-container {
        flex-direction: column; /* Alinha os itens em uma coluna */
        gap: 20px; /* Reduz o espaço entre os itens */
    }

    .tortas-item img {
        max-width: 100%; /* Permite que as imagens se ajustem à largura da tela */
    }
}

@media (max-width: 480px) {
    .tortas-container {
        padding: 10px; /* Reduz o padding para telas menores */
    }

    .tortas-item img {
        max-width: 100%; /* Faz com que as imagens fiquem responsivas */
    }
}

 
  .aviso {
    color: #ffcc00;
    font-weight: bold;
    text-align: center;
    background-color: #1a1a1a;
    padding: 10px;
    border-radius: 5px;
  }





    </style>
</head>
<body>
