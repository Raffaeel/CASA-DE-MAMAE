    <style>
body {
    background-color: rgb(248, 247, 250);
}

.salgado-container {
    display: flex; /* Alinhamento horizontal */
    gap: 50px; /* Espaço entre os itens */
    justify-content: center;
    padding: 3%;
}

.salgado-item {
    text-align: center;
}

.salgado-item img {
    width: 190px;
    height: 190px;
    border: 3px solid black;
}

h2 {
    text-align: center;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
}

.salgadoA-container {

    padding: 3%;
}

.salgadosAssados-item {

}

h2 {
    text-align: center;

}

/* Responsividade */
@media (max-width: 1024px) {
    .salgado-container, .salgadoA-container {
        flex-wrap: wrap; /* Quebra para a linha quando necessário */
        gap: 30px; /* Menor espaço entre os itens */
    }

    .salgado-item img, .salgadosAssados-item img {
        width: 160px;
        height: 160px;
    }
}

@media (max-width: 768px) {
    .salgado-container, .salgadoA-container {
        gap: 20px; /* Menor espaço */
    }

    .salgado-item img, .salgadosAssados-item img {
        width: 140px;
        height: 140px;
    }
}

@media (max-width: 480px) {
    .salgado-container, .salgadoA-container {
        flex-direction: column; /* Alinha os itens verticalmente */
        align-items: center; /* Centraliza os itens */
        gap: 10px; /* Menor espaço */
    }

    .salgado-item img, .salgadosAssados-item img {
        width: 120px;
        height: 120px;
    }

    h2 {
        font-size: 16px;
    }
}
